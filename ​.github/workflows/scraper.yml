name: Daily Football Scraper

on:
  schedule:
    # 22:30 UTC is 05:00 AM Myanmar (Yangon) Time
    - cron: '30 22 * * *'
  workflow_dispatch: # Manually run လုပ်ချင်ရင် ခလုတ်နှိပ်လို့ရအောင်

jobs:
  scrape-job:
    runs-on: ubuntu-latest
    permissions:
      contents: write # File ကို ပြန်ရေးဖို့ ခွင့်ပြုချက်ပေးရန်

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: curl

      - name: Run Scraper Script
        run: php scraper.php

      - name: Commit and Push if changes
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "actions@github.com"
          git add football_data.json
          # အကယ်၍ ပြောင်းလဲမှုရှိမှသာ commit လုပ်မယ်
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update football data: $(date +'%Y-%m-%d %H:%M:%S')" && git push)
